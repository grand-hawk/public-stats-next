name: Update data

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  create-temporary-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Create temporary branch
        run: git checkout -b workflow/update-data/${{ github.run_id }}

      - name: Push temporary branch
        run: git push origin workflow/update-data/${{ github.run_id }}

  update-vehicles-in-loadout:
    runs-on: ubuntu-latest
    needs: create-temporary-branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Execute script
        id: roblox-luau-execution
        uses: grand-hawk/action-roblox-luau-execution@1.0.0
        with:
          roblox_api_key: ${{ secrets.ROBLOX_LUAU_EXECUTION_API_KEY }}
          universe_id: '3221676855'
          place_id: '8421780146'
          luau_file: './scripts/vehiclesInLoadout.luau'
          output_file: 'script-execution-output.json'

      - name: Process JSON output
        run: jq ".[0]" "./script-execution-output.json" > "./data/vehiclesInLoadout.json"

      - name: Commit changes
        run: |
          git add ./data/vehiclesInLoadout.json && \
          git commit -m "Update vehiclesInLoadout.json" && \
          git pull origin workflow/update-data/${{ github.run_id }} --rebase && \
          git push origin workflow/update-data/${{ github.run_id }}

  update-data:
    runs-on: ubuntu-latest
    needs: update-vehicles-in-loadout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - uses: pnpm/action-setup@v4.0.0
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install pnpm packages
        run: pnpm install

      - name: Update data
        run: pnpm tsx scripts/updateData.mts
        env:
          INSIGHTS_API_URL: ${{ secrets.INSIGHTS_API_URL }}
          INSIGHTS_API_AUTH: ${{ secrets.INSIGHTS_API_AUTH }}

      - run: |
          git add ./data/** && \
          git commit -m "Update data" && \
          git pull origin workflow/update-data/${{ github.run_id }} --rebase && \
          git push origin workflow/update-data/${{ github.run_id }}

  finalize-git-changes:
    runs-on: ubuntu-latest
    needs: update-data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - run: git checkout dev
      - run: git rebase origin/workflow/update-data/${{ github.run_id }}
      - run: git push origin dev

      - name: Create pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Update data" \
            --base prod \
            --head workflow/update-data/${{ github.run_id }}
