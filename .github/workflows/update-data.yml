name: Update data

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update-vehicles-in-loadout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Execute script
        id: roblox-luau-execution
        uses: grand-hawk/action-roblox-luau-execution@1.0.0
        with:
          roblox_api_key: ${{ secrets.ROBLOX_LUAU_EXECUTION_API_KEY }}
          universe_id: '3221676855'
          place_id: '8421780146'
          luau_file: './scripts/vehiclesInLoadout.luau'
          output_file: 'script-execution-output.json'

      - name: Process JSON output
        run: jq ".[0]" "./script-execution-output.json" > "./data/vehiclesInLoadout.json"

      - name: Remove temp file
        run: rm script-execution-output.json

      - run: |
          git checkout -b workflow/update-data/${{ github.run_id }}
          git add ./data/vehiclesInLoadout.json
          if ! git diff --cached --quiet; then
            git commit -m "Update vehiclesInLoadout.json"
            git push origin workflow/update-data/${{ github.run_id }}
          else
            echo "No changes to commit."
          fi

  update-data:
    runs-on: ubuntu-latest
    needs: update-vehicles-in-loadout

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - uses: pnpm/action-setup@v4.0.0
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install pnpm packages
        run: pnpm install

      - run: |
          git fetch origin workflow/update-data/${{ github.run_id }}
          if git ls-tree -r origin/workflow/update-data/${{ github.run_id }} --name-only | grep -q '^data/vehiclesInLoadout.json$'; then
            git checkout origin/workflow/update-data/${{ github.run_id }} -- ./data/vehiclesInLoadout.json
          fi

      - name: Update data
        run: pnpm tsx scripts/updateData.mts
        env:
          INSIGHTS_API_URL: ${{ secrets.INSIGHTS_API_URL }}
          INSIGHTS_API_AUTH: ${{ secrets.INSIGHTS_API_AUTH }}

      - run: |
          git checkout workflow/update-data/${{ github.run_id }}
          git add ./data/**
          if ! git diff --cached --quiet; then
            git commit -m "Update data"
            git pull origin workflow/update-data/${{ github.run_id }} --rebase
            git push origin workflow/update-data/${{ github.run_id }}
          else
            echo "No changes to commit."
          fi

  finalize-git-changes:
    runs-on: ubuntu-latest
    needs: update-data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: workflow/update-data/${{ github.run_id }}

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - run: |
          git fetch --all
          for branch in dev prod; do
            git checkout $branch
            git checkout origin/workflow/update-data/${{ github.run_id }} -- ./data/**
            git add ./data/**
            if ! git diff --cached --quiet; then
              git commit -m "Update data from workflow/update-data/${{ github.run_id }}"
              git push origin $branch
            else
              echo "No changes to commit on $branch."
            fi
          done
          git push --delete origin workflow/update-data/${{ github.run_id }}
