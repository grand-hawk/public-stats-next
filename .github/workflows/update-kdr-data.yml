name: Update KDR Data

on:
  schedule:
    - cron: '0 3 * * *' # Runs daily at 03:00 UTC
  workflow_dispatch:

jobs:
  update-kdr-data:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.check_changes.outputs.changes_detected }}
      temp_branch: ${{ steps.create_branch.outputs.temp_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure full history for rebase

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Pull latest changes to prevent conflicts
        run: |
          git fetch --all
          git checkout dev
          git pull --rebase origin dev --autostash

      - uses: pnpm/action-setup@v4.0.0
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Update KDR data
        run: pnpm tsx scripts/updateData-kdr.mts
        env:
          INSIGHTS_API_URL: ${{ secrets.INSIGHTS_API_URL }}
          INSIGHTS_API_AUTH: ${{ secrets.INSIGHTS_API_AUTH }}

      - name: Check for data changes
        id: check_changes
        run: |
          if ! git diff --quiet origin/dev -- ./data/kdr/; then
            echo "changes_detected=true" >> $GITHUB_ENV
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_ENV
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create temporary branch
        id: create_branch
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: |
          BRANCH_NAME="workflow/update-kdr-data-${{ github.run_id }}"
          git checkout -b $BRANCH_NAME
          git add ./data/kdr/
          git commit -m "Update KDR data"
          git push origin $BRANCH_NAME --force-with-lease
          echo "temp_branch=$BRANCH_NAME" >> $GITHUB_ENV
          echo "temp_branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

  push-changes:
    runs-on: ubuntu-latest
    needs: update-kdr-data
    if: needs.update-kdr-data.outputs.changes_detected == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.update-kdr-data.outputs.temp_branch }}

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Rebase and push into dev and prod
        run: |
          TEMP_BRANCH=${{ needs.update-kdr-data.outputs.temp_branch }}
          for branch in dev prod; do
            git checkout $branch
            git pull --rebase origin $branch --autostash
            git rebase $TEMP_BRANCH
            git push origin $branch --force-with-lease
          done

      - name: Delete temporary branch
        run: |
          git push origin --delete ${{ needs.update-kdr-data.outputs.temp_branch }}
