name: Update Shells

on:
  schedule:
    - cron: '10 0 * * 0' # Runs every Sunday at 00:10 UTC
  workflow_dispatch:

jobs:
  update-shells:
    runs-on: self-hosted
    strategy:
      matrix:
        environment:
          - name: Sunny Valley
            universe_id: '3221676855'
            place_id: '8421780146'
            data_path: './data/shells/8421780146.json'
          - name: Multicrew Tank Combat
            universe_id: '3546912119'
            place_id: '9520328730'
            data_path: './data/shells/9520328730.json'
    outputs:
      any_changes: ${{ steps.check_changes.outputs.changes_detected }}
      temp_branch: ${{ steps.create_branch.outputs.temp_branch }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Pull latest changes
        run: |
          git fetch --all
          git checkout dev
          git pull --rebase origin dev --autostash

      - name: Execute script to update shell data
        uses: grand-hawk/action-roblox-luau-execution@1.0.0
        with:
          roblox_api_key: ${{ secrets.ROBLOX_LUAU_EXECUTION_API_KEY }}
          universe_id: ${{ matrix.environment.universe_id }}
          place_id: ${{ matrix.environment.place_id }}
          luau_file: './scripts/shells.luau'
          output_file: 'script-execution-output.json'

      - name: Process JSON output
        run: jq ".[0]" "./script-execution-output.json" > "${{ matrix.environment.data_path }}"

      - name: Remove temporary file
        run: rm script-execution-output.json

      - name: Check for data changes
        id: check_changes
        run: |
          if ! git diff --quiet origin/dev -- "${{ matrix.environment.data_path }}"; then
            echo "changes_detected=true" >> $GITHUB_ENV
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          else
            echo "changes_detected=false" >> $GITHUB_ENV
            echo "changes_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: Create temporary branch
        id: create_branch
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: |
          BRANCH_NAME="workflow/update-shells-${{ github.run_id }}-${{ matrix.environment.name }}"
          git checkout -b $BRANCH_NAME
          git add "${{ matrix.environment.data_path }}"
          git commit -m "Update shells data"
          git push origin $BRANCH_NAME --force-with-lease
          echo "temp_branch=$BRANCH_NAME" >> $GITHUB_ENV
          echo "temp_branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

  collect-results:
    runs-on: ubuntu-latest
    needs: update-shells
    outputs:
      any_changes: ${{ needs.update-shells.outputs.any_changes }}
      temp_branches: ${{ toJson(needs.update-shells.outputs.temp_branch) }}
    steps:
      - name: Determine if any changes were detected
        run: |
          echo "Collected branches: ${{ toJson(needs.update-shells.outputs.temp_branch) }}"
          if [[ -z "${{ needs.update-shells.outputs.temp_branch }}" ]]; then
            echo "No changes detected."
            echo "any_changes=false" >> $GITHUB_ENV
          else
            echo "any_changes=true" >> $GITHUB_ENV
          fi

  push-to-branches:
    runs-on: ubuntu-latest
    needs: collect-results
    if: needs.collect-results.outputs.any_changes == 'true'
    strategy:
      matrix:
        branch: [dev, prod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Ensure dev and prod branches exist locally
        run: |
          git fetch --all
          git branch --track dev origin/dev || true
          git branch --track prod origin/prod || true

      - name: Merge shell updates into ${{ matrix.branch }}
        run: |
          TEMP_BRANCHES=${{ fromJson(needs.collect-results.outputs.temp_branches) }}

          git checkout ${{ matrix.branch }}
          git pull --rebase origin ${{ matrix.branch }} --autostash

          if [ "${{ matrix.branch }}" = "dev" ]; then
            for BRANCH in $TEMP_BRANCHES; do
              echo "Merging $BRANCH into dev"
              git merge --no-ff $BRANCH -m "Merge shell updates from $BRANCH"
            done
          else
            git checkout dev
            git pull origin dev --rebase --autostash
            for BRANCH in $TEMP_BRANCHES; do
              echo "Cherry-picking $BRANCH into prod"
              git cherry-pick -n $(git rev-parse $BRANCH)
            done
            git checkout prod
          fi

          git push origin ${{ matrix.branch }} --force-with-lease

      - name: Delete temporary branches
        if: matrix.branch == 'prod'
        run: |
          TEMP_BRANCHES=${{ fromJson(needs.collect-results.outputs.temp_branches) }}
          for BRANCH in $TEMP_BRANCHES; do
            git push origin --delete $BRANCH
          done
