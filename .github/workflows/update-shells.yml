name: Update Shells

on:
  schedule:
    - cron: '10 0 * * 0'  # Runs every Sunday at 00:10 UTC
  workflow_dispatch:

jobs:
  update-shells:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.check_changes.outputs.changes_detected }}
      temp_branch: ${{ steps.create_branch.outputs.temp_branch }}
    strategy:
      matrix:
        environment:
          - name: Sunny Valley
            universe_id: '3221676855'
            place_id: '8421780146'
            data_path: './data/shells/8421780146.json'
          - name: Multicrew Tank Combat
            universe_id: '3546912119'
            place_id: '9520328730'
            data_path: './data/shells/9520328730.json'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Execute script to update shell data
        uses: grand-hawk/action-roblox-luau-execution@1.0.0
        with:
          roblox_api_key: ${{ secrets.ROBLOX_LUAU_EXECUTION_API_KEY }}
          universe_id: ${{ matrix.environment.universe_id }}
          place_id: ${{ matrix.environment.place_id }}
          luau_file: './scripts/shells.luau'
          output_file: 'script-execution-output.json'

      - name: Process JSON output
        run: jq ".[0]" "./script-execution-output.json" > "${{ matrix.environment.data_path }}"

      - name: Remove temporary file
        run: rm script-execution-output.json

      - name: Check for data changes
        id: check_changes
        run: |
          git fetch origin dev
          if ! git diff --quiet origin/dev -- "${{ matrix.environment.data_path }}"; then
            echo "changes_detected=true" >> $GITHUB_ENV
          else
            echo "changes_detected=false" >> $GITHUB_ENV
          fi

      - name: Create temporary branch
        id: create_branch
        if: env.changes_detected == 'true'
        run: |
          BRANCH_NAME="workflow/update-shells-${{ github.run_id }}"
          git checkout -b $BRANCH_NAME
          git add "${{ matrix.environment.data_path }}"
          git commit -m "Update shells data"
          git push origin $BRANCH_NAME
          echo "temp_branch=$BRANCH_NAME" >> $GITHUB_ENV

  push-changes:
    runs-on: ubuntu-latest
    needs: update-shells
    if: needs.update-shells.outputs.changes_detected == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.update-shells.outputs.temp_branch }}

      - name: Setup git
        uses: fregante/setup-git-user@v2

      - name: Merge into dev and prod
        run: |
          TEMP_BRANCH=${{ needs.update-shells.outputs.temp_branch }}
          for branch in dev prod; do
            git checkout $branch
            git pull origin $branch
            git merge --no-ff $TEMP_BRANCH -m "Merge updated shells data"
            git push origin $branch
          done

      - name: Delete temporary branch
        run: |
          git push origin --delete ${{ needs.update-shells.outputs.temp_branch }}
